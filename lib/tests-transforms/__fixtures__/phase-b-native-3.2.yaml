openapi: '3.2.0'
info:
  title: Native OpenAPI 3.2 Proof Kit
  description: Proof fixture for native OpenAPI 3.2 query operations, hierarchical tags, device authorization, XML nodeType, and templated paths.
  version: '0.2.0'
tags:
  - name: meta
    summary: Meta tag for Phase B groupings
    kind: group
  - name: hierarchical
    summary: Hierarchical tag with parent metadata
    parent: meta
    kind: feature
security:
  - deviceFlow:
      - 'read:devices'
paths:
  /phase-b:
    servers:
      - url: 'https://phaseb.example.com'
        description: Phase B endpoint host
    query:
      summary: Perform the Phase B query operation
      operationId: phaseBQuery
      tags:
        - hierarchical
      responses:
        '200':
          description: Phase B query succeeded
  /devices/{device-id}/tokens/{token.id}:
    get:
      summary: Retrieve a device token
      operationId: phaseCGetDeviceToken
      tags:
        - hierarchical
      parameters:
        - name: device-id
          in: path
          required: true
          schema:
            type: string
        - name: token.id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Device token retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceToken'
components:
  securitySchemes:
    deviceFlow:
      type: oauth2
      flows:
        deviceAuthorization:
          deviceAuthorizationUrl: 'https://auth.example.com/device'
          tokenUrl: 'https://auth.example.com/token'
          refreshUrl: 'https://auth.example.com/refresh'
          scopes:
            'read:devices': Read device tokens
  schemas:
    DeviceToken:
      type: object
      required:
        - id
        - payload
      xml:
        name: deviceToken
        nodeType: element
      properties:
        id:
          type: string
          xml:
            nodeType: attribute
        payload:
          type: string
          xml:
            nodeType: text
