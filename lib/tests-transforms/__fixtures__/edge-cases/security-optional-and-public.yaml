openapi: 3.1.0
info:
  title: Optional Security and Public Override Fixture
  version: 1.0.0
security:
  - apiKey: []
  - {}
paths:
  /inherits:
    get:
      operationId: getInherits
      responses:
        '200':
          description: ok
  /optional:
    get:
      operationId: getOptional
      security:
        - {}
      responses:
        '200':
          description: ok
  /public:
    get:
      operationId: getPublic
      security: []
      responses:
        '200':
          description: ok
components:
  securitySchemes:
    apiKey:
      type: apiKey
      name: X-API-Key
      in: header
