name: Setup pnpm + Node
description: >-
  Install pnpm (version from the root packageManager field), set up Node 24 with
  pnpm-store caching, and install workspace dependencies with a frozen lockfile.
  Run this AFTER actions/checkout. The first CI job to run (`install`) populates
  the pnpm store cache on a cold key; every later job restores that cache and
  installs offline, so a changed lockfile triggers exactly one network install
  per run instead of one per job. (Brought from OCE's composite setup action,
  2026-07-03; castr passes no explicit pnpm version — pnpm/action-setup reads
  the root packageManager field.)

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      with:
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24'
        cache: 'pnpm'

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
