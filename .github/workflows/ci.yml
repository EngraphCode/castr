# Quality-gate pipeline for pushes and PRs to main, split into parallel jobs
# (brought from OCE's CI architecture, 2026-07-03) so each gate reports as its
# own check and superseded PR runs cancel. A final `quality-gates` fan-in job is
# the single required status check: it fails unless EVERY gate succeeded (failed,
# cancelled, and skipped all block), and it reuses the context name the branch
# ruleset already requires, so the ruleset needs no change.
#
# The job set maps 1:1 onto the local `pnpm qg` chain — no gate is dropped:
#   secret-scan          — secrets:scan (pinned gitleaks; no pnpm install)
#   install              — warms the pnpm store cache (the one network install)
#     static-checks      — format:check, markdownlint-check:root,
#                          portability:check, repo-validators:check (tsx-based;
#                          none of these need a build)
#     build              — turbo build as its own fail-fast gate
#       unit-tests       — type-check, lint, test (as test:coverage) + coverage
#                          uploads and the workspace-enumeration guard
#       structure-checks — madge:circular/orphans, depcruise, knip,
#                          packaging:check, skills:check, agents:check
#       proof-suites     — character, snapshot, gen, transforms, e2e
#   quality-gates        — fail-closed fan-in; the required status check
#
# Caching strategy: the pnpm store cache (composite setup action) is the one
# shared cache — a changed lockfile costs one network install per run. Turbo
# task caching is deliberately OFF repo-wide (`cache: false` on every task in
# turbo.json), so build-dependent jobs re-run `build` via their tasks'
# `dependsOn: ["build"]` edges (~30s each — correctness over reuse; flipping
# build caching on is a separate policy decision). The `build` job exists as
# its own fail-fast gate, not as an artefact warmer.
#
# No `paths:` filter: changes anywhere (agent-tools, .agent, .husky, docs, lib)
# trigger CI. CodeQL runs via GitHub's default code-scanning setup (repo
# Security settings), not as a workflow job here: default setup rejects SARIF
# uploads from advanced-setup workflows for the same languages.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded PR runs; never cancel main-branch runs (each commit on main
# must stay verified).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Branch + tag secret scan. Independent of node_modules, so it runs from t=0
  # in parallel with `install`. gitleaks is a security control, so its binary is
  # content-pinned (sha256), not just version-pinned.
  secret-scan:
    name: secret-scan
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # secrets:scan runs gitleaks --branches --tags; needs full history

      - name: Install pinned gitleaks
        run: |
          version=8.30.0
          asset="gitleaks_${version}_linux_x64.tar.gz"
          expected=79a3ab579b53f71efd634f3aaf7e04a0fa0cf206b7ed434638d1547a2470a66e
          curl -sSfL -o "$asset" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${version}/${asset}"
          echo "${expected}  ${asset}" | sha256sum -c -
          sudo tar -xz -C /usr/local/bin -f "$asset" gitleaks
          gitleaks version

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Scan for secrets
        run: pnpm secrets:scan

  # Cold-cache install gate: performs the one network install on a changed
  # lockfile and saves the pnpm store cache, so dependent jobs install offline.
  install:
    name: install
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup

  # Static analysis that needs node_modules but no build. Runs in parallel with
  # `build`. repo-validators + portability run from agent-tools SOURCE via tsx.
  static-checks:
    name: static-checks
    permissions:
      contents: read
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - name: Check formatting
        run: pnpm format:check
      - name: Check markdown
        run: pnpm markdownlint-check:root
      - name: Validate portability
        run: pnpm portability:check
      - name: Run workspace-owned repo validators
        run: pnpm repo-validators:check

  # Builds every workspace as a fail-fast gate. Downstream jobs re-run build via
  # their tasks' dependsOn edges (turbo caching is off repo-wide by design).
  build:
    name: build
    permissions:
      contents: read
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - name: Build
        run: pnpm exec turbo run build --log-order=grouped

  # Type-check, lint, and the in-process test suites with coverage. Coverage is
  # a signal, not a gate: the ruleset's code_coverage rule consumes the uploads
  # (thresholds live in the ruleset); the correctness bar stays the
  # behaviour-proof suites.
  unit-tests:
    name: unit-tests
    permissions:
      contents: read
      code-quality: write # coverage upload (actions/upload-code-coverage)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - name: Type-check and lint
        run: pnpm exec turbo run type-check lint --continue --log-order=grouped
      - name: Unit + integration tests with coverage
        run: pnpm test:coverage

      # Fail-loud workspace-enumeration guard: the upload steps below name each
      # workspace explicitly, so a NEW workspace must appear in three places —
      # pnpm-workspace.yaml, its vitest coverage config, and an upload step
      # here. This guard derives the workspace list from pnpm and fails the job
      # when any workspace lacks a coverage report, so the enumeration below can
      # never rot silently. Deliberate exclusions go in EXCLUDED with a reason.
      - name: Assert every workspace produced a coverage report
        run: |
          EXCLUDED=""
          missing=0
          for dir in $(pnpm -r ls --depth -1 --parseable | tail -n +2); do
            ws=$(basename "$dir")
            case " $EXCLUDED " in *" $ws "*) continue ;; esac
            if [ ! -f "$dir/coverage/cobertura-coverage.xml" ]; then
              echo "::error::workspace '$ws' produced no coverage report ($dir/coverage/cobertura-coverage.xml missing) — wire vitest coverage + an upload step, or add it to EXCLUDED with a reason"
              missing=1
            fi
          done
          exit $missing

      - name: Upload lib coverage
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@abb5995db9e0199b0e2bb9dbd136fce4cb1ec4d3 # v1.3.0
        with:
          file: lib/coverage/cobertura-coverage.xml
          language: TypeScript
          label: code-coverage/lib

      - name: Upload agent-tools coverage
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@abb5995db9e0199b0e2bb9dbd136fce4cb1ec4d3 # v1.3.0
        with:
          file: agent-tools/coverage/cobertura-coverage.xml
          language: TypeScript
          label: code-coverage/agent-tools

  # Structure, dependency-direction, unused-code, and packaging checks. These
  # resolve through built dist/ outputs (knip, publint/attw, the adapter
  # --check binaries), so restore the build first.
  structure-checks:
    name: structure-checks
    permissions:
      contents: read
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      # packaging:check is a plain pnpm script (publint + attw), not a turbo
      # task, so no dependsOn edge builds lib/dist for it — build explicitly.
      - name: Build (packaging check inspects lib/dist)
        run: pnpm exec turbo run build --log-order=grouped
      - name: Circular-dependency and orphan checks (madge)
        run: pnpm madge:circular && pnpm madge:orphans
      - name: Dependency-direction check (depcruise)
        run: pnpm depcruise
      - name: Unused-code check (knip)
        run: pnpm knip
      - name: Packaging check (publint + attw)
        run: pnpm packaging:check
      - name: Skills adapter check
        run: pnpm skills:check
      - name: Agent adapter check
        run: pnpm agents:check

  # The behaviour-proof suites beyond unit/integration — the long pole, so it
  # gets its own lane parallel to unit-tests and structure-checks.
  proof-suites:
    name: proof-suites
    permissions:
      contents: read
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      # --concurrency=1 keeps the suites SEQUENTIAL within the job, matching
      # local `test:all` semantics: five vitest processes sharing a 2-core
      # runner blow per-test timeouts (measured — test:transforms zod-roundtrip
      # timed out under 5-way parallelism), and each suite deserves the whole
      # machine. The job itself still runs in parallel with the other lanes.
      - name: Character, snapshot, gen, transforms, e2e suites
        run: >-
          pnpm exec turbo run character test:snapshot test:gen test:transforms
          test:e2e --continue --log-order=grouped --concurrency=1

  # Single required status check: fans in every gate above and fails unless
  # every one succeeded — failed, cancelled, AND skipped results all block
  # (fail-closed, so adding an `if:` guard to a gate later cannot silently
  # bypass it). Reusing the existing `quality-gates` context keeps the branch
  # ruleset unchanged while each split job blocks merge.
  quality-gates:
    name: quality-gates
    permissions: {}
    needs:
      - secret-scan
      - install
      - static-checks
      - build
      - unit-tests
      - structure-checks
      - proof-suites
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Require EVERY gate result to be `success`. The expression is read via an
      # env var so no `${{ }}` value is interpolated into the shell.
      - name: Verify every quality gate passed
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "Gate results: $RESULTS"
          IFS=',' read -ra results <<< "$RESULTS"
          for result in "${results[@]}"; do
            if [ "$result" != "success" ]; then
              echo "::error::Quality gate result '$result' is not 'success' — blocking merge."
              exit 1
            fi
          done
          echo "All quality gates passed."
