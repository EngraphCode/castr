# Quality-gate pipeline for pushes and PRs to main. A single `quality-gates`
# job runs the full local gate (`pnpm check:ci` = clean + frozen install + qg)
# server-side, so the guardrails that were previously local-pre-push-only —
# every repo validator, type-check, lint, secret scan, knip/depcruise, the full
# test suite — now also run in CI and can be made a required status check.
#
# No `paths:` filter: changes anywhere (agent-tools, .agent, .husky, docs, lib)
# trigger CI. The old library-only filter meant tooling/Practice changes were
# never verified server-side.
#
# `quality-gates` is the required status check on `main` (enforced by the
# branch ruleset — a repo setting, not expressible here). CodeQL runs via
# GitHub's default code-scanning setup (repo Security settings), not as a
# workflow job here: default setup rejects SARIF uploads from advanced-setup
# workflows for the same languages, so the two modes cannot coexist.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded PR runs; never cancel main-branch runs (each commit on main
# must stay verified).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality-gates:
    name: quality-gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      code-quality: write # coverage upload (actions/upload-code-coverage)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # secrets:scan runs gitleaks --branches --tags; needs full history

      - name: Install pinned gitleaks
        run: |
          version=8.30.0
          asset="gitleaks_${version}_linux_x64.tar.gz"
          # SHA-256 of the v8.30.0 linux_x64 asset, pinned inline so a tampered
          # download fails loud (sha256sum -c) rather than running. gitleaks is a
          # security control, so its binary is content-pinned, not just version-pinned.
          expected=79a3ab579b53f71efd634f3aaf7e04a0fa0cf206b7ed434638d1547a2470a66e
          curl -sSfL -o "$asset" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${version}/${asset}"
          echo "${expected}  ${asset}" | sha256sum -c -
          sudo tar -xz -C /usr/local/bin -f "$asset" gitleaks
          gitleaks version

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11

      - name: Use Node.js 24.x
        uses: actions/setup-node@v3
        with:
          node-version: 24.x
          cache: 'pnpm'

      - name: Run full quality gate (clean + frozen install + qg)
        run: pnpm check:ci

      # Coverage is a signal, not a gate: the ruleset's code_coverage rule
      # (min 10%, max drop 2) consumes these uploads; the correctness bar
      # stays the behaviour-proof suites run by check:ci above.
      - name: Generate coverage for in-process suites (unit + integration)
        run: pnpm test:coverage

      - name: Upload lib coverage
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          file: lib/coverage/cobertura-coverage.xml
          language: TypeScript
          label: code-coverage/lib

      - name: Upload agent-tools coverage
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          file: agent-tools/coverage/cobertura-coverage.xml
          language: TypeScript
          label: code-coverage/agent-tools
